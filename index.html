<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Fake News Detector</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .container {
      width: 100%;
      max-width: 720px;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    header { text-align: center; }

    header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #818cf8, #38bdf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle { color: #94a3b8; margin-top: .4rem; font-size: .95rem; }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 1rem;
      padding: 1.75rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    label { font-size: .9rem; color: #94a3b8; }

    textarea {
      width: 100%;
      resize: vertical;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: .6rem;
      color: #e2e8f0;
      font-size: 1rem;
      padding: .85rem 1rem;
      outline: none;
      transition: border-color .2s;
    }
    textarea:focus { border-color: #818cf8; }

    button {
      align-self: flex-end;
      background: linear-gradient(135deg, #818cf8, #38bdf8);
      border: none;
      border-radius: .6rem;
      color: #fff;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      padding: .7rem 2rem;
      transition: opacity .2s, transform .1s;
    }
    button:hover:not(:disabled)  { opacity: .9; transform: translateY(-1px); }
    button:active:not(:disabled) { transform: translateY(0); }
    button:disabled { opacity: .5; cursor: not-allowed; }

    .result {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 1rem;
      padding: 1.75rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .75rem;
      animation: fadeIn .4s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .badge {
      font-size: 1.5rem;
      font-weight: 700;
      padding: .6rem 2rem;
      border-radius: 2rem;
    }

    .badge.fake {
      background: rgba(239, 68, 68, .15);
      color: #f87171;
      border: 1px solid #ef4444;
    }

    .badge.real {
      background: rgba(34, 197, 94, .15);
      color: #4ade80;
      border: 1px solid #22c55e;
    }

    .badge.uncertain {
      background: rgba(234, 179, 8, .15);
      color: #facc15;
      border: 1px solid #eab308;
    }

    .confidence { color: #94a3b8; font-size: .95rem; }

    .loader {
      text-align: center;
      color: #818cf8;
      font-style: italic;
      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }

    .error {
      text-align: center;
      color: #f87171;
      background: rgba(239, 68, 68, .1);
      border: 1px solid #ef4444;
      border-radius: .6rem;
      padding: .75rem 1rem;
    }

    .hidden { display: none !important; }

    footer { text-align: center; color: #475569; font-size: .8rem; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🔍 Fake News Detector</h1>
      <p class="subtitle">Powered by Machine Learning &amp; NLP</p>
    </header>

    <main>
      <div class="card">
        <label for="newsInput">Paste or type a news article below:</label>
        <textarea id="newsInput" rows="8" placeholder="Enter news text here…"></textarea>
        <button id="analyzeBtn" onclick="analyzeNews()">Analyse</button>
      </div>

      <div id="result" class="result hidden">
        <div id="resultBadge" class="badge"></div>
        <p id="confidenceText" class="confidence"></p>
      </div>

      <div id="loader" class="loader hidden">Analysing…</div>
      <div id="errorMsg" class="error hidden"></div>
    </main>

    <footer>
      <p>Built with Python · Flask · scikit-learn · NLTK</p>
    </footer>
  </div>

  <script>
    async function analyzeNews() {
      const text   = document.getElementById('newsInput').value.trim();
      const result = document.getElementById('result');
      const loader = document.getElementById('loader');
      const errMsg = document.getElementById('errorMsg');

      result.classList.add('hidden');
      errMsg.classList.add('hidden');

      if (!text) {
        errMsg.textContent = '⚠ Please enter some news text first.';
        errMsg.classList.remove('hidden');
        return;
      }

      loader.classList.remove('hidden');
      document.getElementById('analyzeBtn').disabled = true;

      try {
        const res  = await fetch('/predict', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error);

        const badge = document.getElementById('resultBadge');
        if (data.label === 'FAKE') {
          badge.textContent = '🚫 FAKE NEWS';
          badge.className   = 'badge fake';
        } else if (data.label === 'REAL') {
          badge.textContent = '✅ REAL NEWS';
          badge.className   = 'badge real';
        } else {
          badge.textContent = '⚠️ UNCERTAIN';
          badge.className   = 'badge uncertain';
        }

        let confidenceStr = `Confidence: ${data.confidence}%`;
        if (data.llm_verified) {
            confidenceStr += " (Verified)";
        }
        document.getElementById('confidenceText').textContent = confidenceStr;

        result.classList.remove('hidden');
      } catch (err) {
        errMsg.textContent = '❌ Error: ' + err.message;
        errMsg.classList.remove('hidden');
      } finally {
        loader.classList.add('hidden');
        document.getElementById('analyzeBtn').disabled = false;
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('newsInput').addEventListener('keydown', e => {
        if (e.key === 'Enter' && e.ctrlKey) analyzeNews();
      });
    });
  </script>
</body>
</html>
